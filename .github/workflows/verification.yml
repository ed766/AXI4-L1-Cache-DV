name: verification

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verilator:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y verilator g++ make python3
      - name: Lint, model, and regression
        run: make project-check

